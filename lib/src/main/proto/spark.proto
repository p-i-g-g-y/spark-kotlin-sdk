}

message QueryNodesByValueResponse {
    map<string, TreeNode> nodes = 1;
    int64 offset = 2;
}

message GetUtxosForAddressRequest {
    string address = 1;
    uint64 offset = 2;
    uint64 limit = 3;
    Network network = 4;
    bool exclude_claimed = 5;
}

message GetUtxosForAddressResponse {
    repeated UTXO utxos = 1;
    uint64 offset = 2;
}

message QuerySparkInvoicesRequest {
    int64 limit = 1;
    int64 offset = 2;
    // returns the status for the provided list of spark invoices.
    repeated string invoice = 3;
}

message QuerySparkInvoicesResponse {
    int64 offset = 1;
    repeated InvoiceResponse invoice_statuses = 2;
}

message InvoiceResponse {
    string invoice = 1;
    InvoiceStatus status = 2;
    oneof transfer_type {
        SatsTransfer sats_transfer = 3;
        TokenTransfer token_transfer = 4;
    }
}

message SatsTransfer {
    bytes transfer_id = 1 [(validate.rules).bytes.len = 16];
}

message TokenTransfer {
    bytes final_token_transaction_hash = 1 [(validate.rules).bytes.len = 32];
}

enum InvoiceStatus {
    reserved 3;

    NOT_FOUND = 0;
    PENDING = 1;
    FINALIZED = 2;
    RETURNED = 4;
}

message InitiateSwapPrimaryTransferRequest {
    // Transfer with refunds and key tweaks signed
    StartTransferRequest transfer = 1;
    // Adaptor public keys to verify the signatures of refunds for the primary
    // transfer in the swap
    AdaptorPublicKeyPackage adaptor_public_keys = 2;
}

message InitiateSwapPrimaryTransferResponse {
    Transfer transfer = 1;
    repeated LeafRefundTxSigningResult signing_results = 2;
}

// Adaptor public key is derived from the secret `t` using formula:
// ```
// T = t * G
// ```
message AdaptorPublicKeyPackage {
    bytes adaptor_public_key = 1;
    bytes direct_adaptor_public_key = 2;
    bytes direct_from_cpfp_adaptor_public_key = 3;
}

enum TreeNodeStatus {
    TREE_NODE_STATUS_CREATING = 0;
    TREE_NODE_STATUS_AVAILABLE = 1;
    TREE_NODE_STATUS_FROZEN_BY_ISSUER = 2;
    TREE_NODE_STATUS_TRANSFER_LOCKED = 3;
    TREE_NODE_STATUS_SPLIT_LOCKED = 4;
    TREE_NODE_STATUS_SPLITTED = 5;
    TREE_NODE_STATUS_AGGREGATED = 6;
    TREE_NODE_STATUS_ON_CHAIN = 7;
    TREE_NODE_STATUS_AGGREGATE_LOCK = 8;
    TREE_NODE_STATUS_EXITED = 9;
    TREE_NODE_STATUS_RENEW_LOCKED = 10;
}

message WalletSetting {
    bytes owner_identity_public_key = 1 [(validate.rules).bytes.len = 33];
    bool private_enabled = 2;
    optional bytes master_identity_public_key = 3 [(validate.rules).bytes.len = 33];
}

message UpdateWalletSettingRequest {
    optional bool private_enabled = 1;
    oneof master_identity_public_key {
        bytes set_master_identity_public_key = 2;
        bool clear_master_identity_public_key = 3;
    }
}

message UpdateWalletSettingResponse {
    WalletSetting wallet_setting = 1;
}


message QueryWalletSettingRequest {
}

message QueryWalletSettingResponse {
    WalletSetting wallet_setting = 1;
}
