version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      grpc:
        patterns:
          - 'io.grpc:*'
      kotlin:
        patterns:
          - 'org.jetbrains.kotlin:*'
          - 'org.jetbrains.kotlinx:*'
      androidx:
        patterns:
          - 'androidx.*:*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
