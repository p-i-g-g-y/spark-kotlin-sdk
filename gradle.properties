sdk.groupId=gy.pig
sdk.artifactId=spark-kotlin-sdk
sdk.version=0.1.0-SNAPSHOT

# ⚠️  AGP 10 DEADLINE — REMOVE THIS LINE BEFORE THE BUILD WILL BREAK
#
# AGP 9 dropped the legacy BaseExtension DSL. The latest published version of
# protobuf-gradle-plugin (0.9.6, Dec 2025) still references BaseExtension and
# crashes on AGP 9 unless we opt back into the legacy DSL via this line.
#
# AGP 9.x: works with this line, prints a deprecation warning at configure time.
# AGP 10.x: removes the escape hatch. THIS LINE STOPS WORKING.
#
# Upstream fix: google/protobuf-gradle-plugin#797 (open since 2026-01-30,
# 2 reviewer approvals, awaiting maintainer merge as of 2026-04-06).
#
# When to remove this line:
#   1. protobuf-gradle-plugin 0.9.7+ ships → bump the version, delete this line
#   2. OR before AGP 10 is on the latest stable channel → vendor the fix
#      (PR #797's diff) into a forked plugin or replace with manual protoc tasks
#
# https://developer.android.com/build/releases/agp-9-0-0-release-notes
# https://github.com/google/protobuf-gradle-plugin/pull/797
android.newDsl=false