android.useAndroidX=true

# -----------------------------------------------------------------------------
# Publishing coordinates — consumed by lib/build.gradle.kts.
# Bump `sdk.version` when cutting a release. Do not commit credentials here;
# put `ossrhUsername`, `ossrhPassword`, and the signing.* keys in
# ~/.gradle/gradle.properties or the CI secret store.
